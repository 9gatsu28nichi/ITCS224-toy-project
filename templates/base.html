<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hotel Reservation{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #ffffff;
            color: #333;
            line-height: 1.6;
        }
        
        header {
            background-color: #ffffff;
            border-bottom: 2px solid #0066cc;
            padding: 1rem;
            text-align: center;
        }
        
        header h1 {
            color: #0066cc;
            font-size: 1.8rem;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }
        
        .content {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 2rem;
            margin: 1rem 0;
        }
        
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
        }
        
        input, select {
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }
        
        button {
            background-color: #0066cc;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        
        button:hover {
            background-color: #0052a3;
        }
        
        button:active {
            background-color: #003d7a;
        }
        
        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .button-group a {
            flex: 1;
            min-width: 120px;
        }
        
        a.btn {
            background-color: #0066cc;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s;
        }
        
        a.btn:hover {
            background-color: #0052a3;
        }
        
        .room-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1rem 0;
            background-color: #f9f9f9;
        }
        
        .room-card h3 {
            color: #0066cc;
            margin-bottom: 0.5rem;
        }
        
        .room-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1rem 0;
            font-size: 0.95rem;
        }
        
        .room-price {
            font-size: 1.5rem;
            color: #0066cc;
            font-weight: 700;
            margin: 1rem 0;
        }
        
        .summary {
            background-color: #f0f7ff;
            border-left: 4px solid #0066cc;
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 4px;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin: 0.5rem 0;
        }
        
        .summary-row strong {
            color: #333;
        }
        
        .reference-number {
            background-color: #e6f2ff;
            border: 2px solid #0066cc;
            border-radius: 4px;
            padding: 1rem;
            margin: 1rem 0;
            text-align: center;
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: #0066cc;
        }
        
        .success-message {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 0;
        }
        
        .error-message {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 0;
        }
        
        .text-center {
            text-align: center;
        }
        
        nav {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        
        nav a {
            background-color: #f0f0f0;
            color: #0066cc;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.95rem;
            transition: background-color 0.3s;
        }
        
        nav a:hover {
            background-color: #e0e0e0;
        }
        
        @media (max-width: 500px) {
            header h1 {
                font-size: 1.4rem;
            }
            
            .content {
                padding: 1.5rem;
                margin: 0.5rem 0;
            }
            
            .container {
                padding: 0.5rem;
            }
            
            .room-details {
                grid-template-columns: 1fr;
            }
            
            button, a.btn {
                width: 100%;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .button-group a {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🏨 Hotel Reservation</h1>
    </header>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
